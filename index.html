<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>samyest.mind</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="apple-touch-icon" href="/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg-base: #E9EDF1;
    --palette-3: #D8E0E7;
    --palette-4: #CAD5DF;
    --palette-5: #B7C6D4;
    --palette-6: #9AAFC2;
    --palette-8: #7D9AB3;

    --glass: rgba(255,255,255,0.45);
    --glass-strong: rgba(255,255,255,0.65);
    --glass-hover: rgba(255,255,255,0.72);
    --glass-border: rgba(255,255,255,0.75);
    --glass-border-soft: rgba(255,255,255,0.5);

    --text: #3B4A5A;
    --text-strong: #2A3644;
    --text-muted: #7D9AB3;
    --text-soft: #9AAFC2;

    --accent: #5B7A94;
    --accent-hover: #4A6680;
    --accent-text: #ffffff;

    --line: rgba(122, 142, 162, 0.14);
    --line-strong: rgba(122, 142, 162, 0.22);

    --todo: #9AAFC2;
    --waiting: #C9A868;
    --doing: #5B7A94;
    --done: #8FA88C;
    --danger: #C48577;

    --radius: 20px;
    --shadow: 0 8px 32px rgba(90,110,130,0.10);
    --shadow-soft: 0 4px 16px rgba(90,110,130,0.06);
  }

  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;overflow:hidden;}
  body{
    background:var(--bg-base);
    color:var(--text);
    font-family:'Inter',-apple-system,sans-serif;
    font-size:14px;
    font-weight:400;
    line-height:1.55;
    -webkit-font-smoothing:antialiased;
    letter-spacing:-0.005em;
    position:relative;
  }

  body::before, body::after{
    content:'';
    position:fixed;
    border-radius:50%;
    filter:blur(100px);
    pointer-events:none;
    z-index:0;
  }
  body::before{
    width:600px;height:600px;
    background:radial-gradient(circle, var(--palette-5), transparent 70%);
    top:-200px;left:-150px;
    opacity:0.75;
  }
  body::after{
    width:700px;height:700px;
    background:radial-gradient(circle, var(--palette-6), transparent 70%);
    bottom:-250px;right:-200px;
    opacity:0.55;
  }

  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
  input,select,textarea{font-family:inherit;color:var(--text);}
  ::selection{background:var(--palette-5);color:var(--text-strong);}

  .app{
    display:grid;
    grid-template-columns:220px 1fr;
    height:100vh;
    position:relative;
    z-index:1;
  }

  aside{
    background:var(--glass);
    backdrop-filter:blur(24px) saturate(160%);
    -webkit-backdrop-filter:blur(24px) saturate(160%);
    border-right:1px solid var(--glass-border-soft);
    display:flex;
    flex-direction:column;
    padding:32px 20px;
  }

  .brand{
    display:flex;
    align-items:center;
    gap:11px;
    padding:0 6px 28px;
    margin-bottom:12px;
  }
  .brand-dot{
    width:32px;height:32px;
    background:linear-gradient(135deg, var(--palette-8), var(--palette-6));
    border-radius:9px;
    display:grid;place-items:center;
    color:white;
    font-family:'Space Grotesk';
    font-weight:500;
    font-size:15px;
    box-shadow:inset 0 1px 0 rgba(255,255,255,0.35), 0 4px 12px rgba(125,154,179,0.35);
  }
  .brand-name{
    font-family:'Space Grotesk',sans-serif;
    font-weight:500;
    font-size:15.5px;
    letter-spacing:-0.015em;
    color:var(--text-strong);
  }
  .brand-name span{color:var(--palette-8);}

  nav{display:flex;flex-direction:column;gap:3px;}
  .nav-label{
    font-family:'JetBrains Mono',monospace;
    font-size:9.5px;
    text-transform:uppercase;
    letter-spacing:0.14em;
    color:var(--text-soft);
    padding:14px 8px 8px;
  }
  .nav-item{
    display:flex;
    align-items:center;
    gap:12px;
    padding:9px 12px;
    border-radius:10px;
    font-size:13.5px;
    color:var(--text);
    transition:all .18s ease;
    text-align:left;
  }
  .nav-item:hover{background:var(--glass-strong);}
  .nav-item.active{
    background:var(--glass-strong);
    color:var(--text-strong);
    font-weight:500;
    box-shadow:var(--shadow-soft);
  }
  .nav-item.active .nav-icon{color:var(--accent);}
  .nav-icon{width:16px;height:16px;color:var(--text-muted);flex-shrink:0;stroke-width:1.75;}

  .side-footer{
    margin-top:auto;
    padding:14px 6px 0;
    font-family:'JetBrains Mono',monospace;
    font-size:10.5px;
    color:var(--text-soft);
    line-height:1.6;
  }
  .side-footer div:first-child{color:var(--text);font-size:11.5px;}

  main{
    overflow-y:auto;
    padding:44px 56px 60px;
    position:relative;
  }
  main::-webkit-scrollbar{width:6px;}
  main::-webkit-scrollbar-track{background:transparent;}
  main::-webkit-scrollbar-thumb{background:rgba(122,142,162,0.25);border-radius:3px;}
  main::-webkit-scrollbar-thumb:hover{background:rgba(122,142,162,0.4);}

  .view-header{
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    margin-bottom:36px;
  }
  .view-header h1{
    font-family:'Space Grotesk',sans-serif;
    font-weight:400;
    font-size:38px;
    letter-spacing:-0.025em;
    line-height:1.05;
    color:var(--text-strong);
  }
  .view-header .eyebrow{
    font-family:'JetBrains Mono',monospace;
    font-size:10.5px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--text-muted);
    margin-bottom:10px;
  }

  .btn-primary{
    background:var(--accent);
    color:var(--accent-text);
    font-weight:500;
    font-size:13px;
    padding:10px 18px;
    border-radius:10px;
    display:inline-flex;
    align-items:center;
    gap:7px;
    transition:all .18s ease;
    box-shadow:0 2px 8px rgba(91,122,148,0.25);
  }
  .btn-primary:hover{
    background:var(--accent-hover);
    transform:translateY(-1px);
    box-shadow:0 4px 14px rgba(91,122,148,0.35);
  }

  .header-cta{
    background:var(--glass);
    backdrop-filter:blur(24px) saturate(160%);
    -webkit-backdrop-filter:blur(24px) saturate(160%);
    border:1px solid var(--glass-border-soft);
    border-radius:16px;
    padding:16px 20px;
    display:flex;
    align-items:center;
    gap:18px;
    box-shadow:var(--shadow-soft);
    min-width:280px;
  }
  .header-cta-info{flex:1;line-height:1.3;}
  .header-cta-title{
    font-family:'Space Grotesk';
    font-weight:500;
    font-size:14px;
    color:var(--text-strong);
    margin-bottom:3px;
    letter-spacing:-0.01em;
  }
  .header-cta-sub{
    font-family:'JetBrains Mono',monospace;
    font-size:10.5px;
    color:var(--text-muted);
    letter-spacing:0.05em;
    text-transform:uppercase;
  }
  .btn-cta{
    background:var(--accent);
    color:var(--accent-text);
    font-weight:500;
    font-size:14px;
    padding:14px 20px;
    border-radius:12px;
    display:inline-flex;
    align-items:center;
    gap:8px;
    transition:all .18s ease;
    box-shadow:0 4px 14px rgba(91,122,148,0.30);
    white-space:nowrap;
    flex-shrink:0;
  }
  .btn-cta:hover{
    background:var(--accent-hover);
    transform:translateY(-1px);
    box-shadow:0 6px 20px rgba(91,122,148,0.40);
  }
  .btn-cta-icon{
    width:26px;height:26px;
    background:rgba(255,255,255,0.2);
    border-radius:7px;
    display:grid;place-items:center;
    font-size:18px;
    font-weight:400;
    line-height:1;
  }

  .glass{
    background:var(--glass);
    backdrop-filter:blur(24px) saturate(160%);
    -webkit-backdrop-filter:blur(24px) saturate(160%);
    border:1px solid var(--glass-border-soft);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
  }

  .status-row{
    display:flex;
    margin-bottom:32px;
    background:var(--glass);
    backdrop-filter:blur(24px) saturate(160%);
    -webkit-backdrop-filter:blur(24px) saturate(160%);
    border:1px solid var(--glass-border-soft);
    border-radius:16px;
    padding:4px;
    box-shadow:var(--shadow-soft);
    width:fit-content;
  }
  .status-item{
    padding:12px 22px;
    display:flex;
    flex-direction:column;
    gap:2px;
    border-right:1px solid var(--line);
  }
  .status-item:last-child{border-right:none;}
  .status-item .lbl{
    font-family:'JetBrains Mono',monospace;
    font-size:10px;
    text-transform:uppercase;
    letter-spacing:0.1em;
    color:var(--text-muted);
  }
  .status-item .val{
    font-family:'Space Grotesk';
    font-weight:500;
    font-size:22px;
    letter-spacing:-0.02em;
    color:var(--text-strong);
  }
  .status-item.overdue .val{color:var(--danger);}

  .date-filter{
    display:flex;
    gap:6px;
    margin-bottom:22px;
    align-items:center;
    flex-wrap:wrap;
  }
  .date-filter-label{
    font-family:'JetBrains Mono',monospace;
    font-size:10.5px;
    text-transform:uppercase;
    letter-spacing:0.1em;
    color:var(--text-muted);
    margin-right:6px;
  }
  .date-pill{
    padding:7px 14px;
    background:var(--glass);
    backdrop-filter:blur(24px) saturate(160%);
    -webkit-backdrop-filter:blur(24px) saturate(160%);
    border:1px solid var(--glass-border-soft);
    border-radius:20px;
    font-size:12px;
    color:var(--text-muted);
    transition:all .15s ease;
  }
  .date-pill:hover{color:var(--text);background:var(--glass-strong);}
  .date-pill.active{
    background:var(--accent);
    color:white;
    border-color:var(--accent);
    box-shadow:0 2px 8px rgba(91,122,148,0.25);
  }

  .dash-grid{
    display:grid;
    grid-template-columns:1.4fr 1fr;
    gap:22px;
  }

  .panel{padding:26px;}
  .panel-head{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:18px;
  }
  .panel-title{
    font-family:'Space Grotesk',sans-serif;
    font-weight:500;
    font-size:16px;
    color:var(--text-strong);
    letter-spacing:-0.015em;
  }
  .panel-hint{
    font-family:'JetBrains Mono',monospace;
    font-size:10.5px;
    color:var(--text-muted);
  }

  .task-row{
    display:flex;
    align-items:center;
    gap:14px;
    padding:14px 12px;
    border-radius:12px;
    cursor:pointer;
    transition:background .15s ease;
    border-bottom:1px solid var(--line);
  }
  .task-row:last-child{border-bottom:none;}
  .task-row:hover{background:var(--glass-strong);}
  .task-check{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
  .task-check{background:var(--col-color, var(--todo));order:0;}
  .task-check.dot-hollow{background:transparent;border:1.5px solid var(--col-color, var(--waiting));box-sizing:border-box;}
  .task-check.dot-done{opacity:0.6;}
  .task-row-break{flex-basis:0;width:0;height:0;order:5;}
  .priority-badge{order:2;}
  .task-client{order:3;}
  .task-date{order:4;}
  .task-title{
    order:1;
    flex:1;
    min-width:0;
    font-size:14px;
    color:var(--text);
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }
  .task-client{
    font-family:'JetBrains Mono',monospace;
    font-size:10.5px;
    color:var(--text-muted);
    padding:3px 10px;
    background:rgba(154,175,194,0.14);
    border-radius:20px;
    white-space:nowrap;
  }
  .task-date{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    color:var(--text-muted);
    min-width:56px;
    text-align:right;
    white-space:nowrap;
  }
  .task-date.overdue{color:var(--danger);}
  .task-date.today{color:var(--accent);font-weight:500;}

  .priority-badge{
    display:inline-flex;
    align-items:center;
    gap:4px;
    padding:3px 9px;
    border-radius:20px;
    font-family:'JetBrains Mono',monospace;
    font-size:9.5px;
    text-transform:uppercase;
    letter-spacing:0.08em;
    font-weight:500;
    white-space:nowrap;
    flex-shrink:0;
  }
  .priority-badge.urgent{
    background:rgba(196,133,119,0.18);
    color:var(--danger);
  }
  .priority-badge.high{
    background:rgba(176,140,92,0.18);
    color:#a17e4c;
  }
  .task-row.urgent{
    background:rgba(196,133,119,0.06);
    box-shadow:inset 3px 0 0 var(--danger);
    padding-left:16px;
  }
  .task-row.urgent:hover{background:rgba(196,133,119,0.11);}
  .task-row.high{box-shadow:inset 3px 0 0 #C9A868;padding-left:16px;}

  .empty{
    padding:48px 20px;
    text-align:center;
    color:var(--text-muted);
    font-size:13px;
    border:1px dashed var(--line-strong);
    border-radius:14px;
  }
  .empty strong{
    display:block;
    color:var(--text);
    margin-bottom:6px;
    font-family:'Space Grotesk';
    font-size:15px;
    font-weight:500;
  }

  .side-col{display:flex;flex-direction:column;gap:22px;}

  .quick-add{display:flex;flex-direction:column;gap:10px;}
  .qa-row{display:flex;gap:8px;}
  .input, .select{
    width:100%;
    background:var(--glass-strong);
    border:1px solid var(--line);
    padding:11px 13px;
    border-radius:10px;
    font-size:13px;
    outline:none;
    transition:all .15s ease;
    color:var(--text);
  }
  .input:focus, .select:focus{
    border-color:var(--accent);
    background:rgba(255,255,255,0.8);
  }
  .input::placeholder{color:var(--text-soft);}
  .select{cursor:pointer;}

  .mini-cal-head{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:14px;
  }
  .mini-cal-title{
    font-family:'Space Grotesk';
    font-weight:500;
    font-size:14px;
    color:var(--text-strong);
    text-transform:capitalize;
  }
  .mini-cal-nav{display:flex;gap:4px;}
  .mini-cal-nav button{
    width:28px;height:28px;
    display:grid;place-items:center;
    background:var(--glass-strong);
    border-radius:8px;
    color:var(--text-muted);
    transition:all .15s ease;
  }
  .mini-cal-nav button:hover{color:var(--accent);background:rgba(255,255,255,0.85);}
  .mini-cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
  .mini-cal-dow{
    font-family:'JetBrains Mono',monospace;
    font-size:9.5px;
    text-transform:uppercase;
    color:var(--text-soft);
    text-align:center;
    padding:4px 0 8px;
  }
  .mini-cal-day{
    aspect-ratio:1;
    display:grid;place-items:center;
    font-size:12px;
    border-radius:7px;
    cursor:pointer;
    position:relative;
    color:var(--text);
    transition:background .12s;
  }
  .mini-cal-day:hover{background:var(--glass-strong);}
  .mini-cal-day.other{color:var(--text-soft);opacity:0.4;}
  .mini-cal-day.today{background:var(--accent);color:var(--accent-text);font-weight:500;}
  .mini-cal-day.has-task::after{
    content:'';
    position:absolute;
    bottom:3px;left:50%;
    transform:translateX(-50%);
    width:4px;height:4px;
    background:var(--accent);
    border-radius:50%;
  }
  .mini-cal-day.today.has-task::after{background:white;}

  .kanban{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(240px, 1fr));
    gap:16px;
    align-items:start;
  }
  .kb-col{padding:20px;min-height:440px;transition:border-color .15s;}
  .kb-col.drag-over{border-color:var(--accent);background:var(--glass-hover);}
  .kb-col-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding-bottom:14px;
    margin-bottom:14px;
    border-bottom:1px solid var(--line);
  }
  .kb-col-title{
    display:flex;
    align-items:center;
    gap:8px;
    font-family:'Space Grotesk';
    font-weight:500;
    font-size:13px;
    text-transform:uppercase;
    letter-spacing:0.08em;
    color:var(--text-strong);
  }
  .kb-col-count{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    color:var(--text-muted);
    background:rgba(154,175,194,0.14);
    padding:3px 10px;
    border-radius:20px;
  }
  .kb-cards{display:flex;flex-direction:column;gap:10px;min-height:80px;}
  .kb-card{
    background:rgba(255,255,255,0.55);
    border:1px solid var(--glass-border-soft);
    border-radius:12px;
    padding:14px 15px;
    cursor:grab;
    transition:all .15s ease;
    box-shadow:var(--shadow-soft);
    position:relative;
    overflow:hidden;
  }
  .kb-card::before{
    content:'';
    position:absolute;
    left:0;top:0;bottom:0;
    width:3px;
    background:var(--col-color, var(--todo));
  }
  .kb-card.done{opacity:0.75;}
  .kb-card:hover{
    background:rgba(255,255,255,0.75);
    transform:translateY(-1px);
    box-shadow:0 6px 20px rgba(90,110,130,0.10);
  }
  .kb-card:active{cursor:grabbing;}
  .kb-card-client{
    font-family:'JetBrains Mono',monospace;
    font-size:10px;
    text-transform:uppercase;
    letter-spacing:0.08em;
    color:var(--text-muted);
    margin-bottom:6px;
  }
  .kb-card-title{
    font-size:14px;
    line-height:1.4;
    color:var(--text-strong);
    margin-bottom:8px;
  }
  .kb-card-meta{
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    color:var(--text-muted);
  }
  .kb-card-meta .overdue{color:var(--danger);}
  .kb-card-meta .today{color:var(--accent);font-weight:500;}

  .cal-view{padding:26px;}
  .cal-view-head{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:22px;
  }
  .cal-view-title{
    font-family:'Space Grotesk';
    font-weight:500;
    font-size:22px;
    color:var(--text-strong);
    text-transform:capitalize;
    letter-spacing:-0.02em;
  }
  .cal-view-nav{display:flex;gap:8px;}
  .cal-view-nav button{
    padding:7px 14px;
    background:var(--glass-strong);
    border-radius:9px;
    font-size:12px;
    color:var(--text-muted);
    transition:all .15s ease;
    border:1px solid transparent;
  }
  .cal-view-nav button:hover{
    color:var(--accent);
    background:rgba(255,255,255,0.8);
    border-color:var(--line);
  }
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
  .cal-dow{
    font-family:'JetBrains Mono',monospace;
    font-size:10.5px;
    text-transform:uppercase;
    letter-spacing:0.08em;
    color:var(--text-soft);
    padding:8px 4px;
    text-align:center;
  }
  .cal-cell{
    min-height:110px;
    background:rgba(255,255,255,0.45);
    border:1px solid var(--glass-border-soft);
    border-radius:12px;
    padding:9px 10px;
    display:flex;
    flex-direction:column;
    gap:4px;
  }
  .cal-cell.other{opacity:0.35;background:transparent;border-color:transparent;}
  .cal-cell.today{border:1px solid var(--accent);background:rgba(255,255,255,0.7);}
  .cal-cell:not(.other){cursor:pointer;}
  .cal-cell:not(.other):hover{background:rgba(255,255,255,0.6);}
  .cal-cell.selected{
    background:rgba(91,122,148,0.10) !important;
    box-shadow:0 0 0 2px var(--accent);
    border-color:var(--accent);
  }

  .day-panel{margin-top:22px;padding:26px;}
  .day-panel-head{
    display:flex;
    justify-content:space-between;

    }

    .cal-cell{min-height:60px;padding:5px 4px;font-size:11px;}
    .cal-dow{padding:6px 2px;font-size:9px;}
    .cal-task{font-size:9.5px;padding:2px 4px;}
    .cal-view{padding:16px;}
    .cal-view-title{font-size:17px;}
    .cal-view-nav button{padding:6px 9px;font-size:11px;}

    .table-filters{flex-direction:column;}
    .task-table th:nth-child(3), .task-table td:nth-child(3){display:none;}
    .task-table th, .task-table td{padding:12px 14px;}

    .modal-bg{padding:0;align-items:flex-end;}
    .modal{
      max-width:100%;

  const t = THEMES[name] || THEMES.bluegray;

}

  const name = document.getElementById('s-name').value.trim();

    selectedColumnColor = col.color;
    delBtn.style.display = getColumns().length > 1 ? '' : 'none';
  } else {
    title.textContent = 'Nova coluna';
    document.getElementById('col-name').value = '';
    selectedColumnColor = COLUMN_COLOR_PRESETS[0];
    delBtn.style.display = 'none';
  }
  renderColorSwatches();
  modal.classList.add('open');
  setTimeout(()=>document.getElementById('col-name').focus(), 50);
}

function closeColumnModal(){
  document.getElementById('column-modal').classList.remove('open');
  editingColumnKey = null;
}

async function saveColumn(){
  const name = document.getElementById('col-name').value.trim();
  if(!name){document.getElementById('col-name').focus();return;}
  if(!state.columns) state.columns = JSON.parse(JSON.stringify(DEFAULT_COLUMNS));
  if(editingColumnKey){
    const col = state.columns.find(c=>c.key===editingColumnKey);
    if(col){col.name = name;col.color = selectedColumnColor;}
  } else {
    const key = 'col_' + Date.now().toString(36) + Math.random().toString(36).slice(2,5);
    state.columns.push({key, name, type: 'active', color: selectedColumnColor});
  }
  const ok = await persistColumns();
  if(ok){
    closeColumnModal();
    render();
    if(document.getElementById('settings-modal').classList.contains('open')) renderSettingsColumnsList();
  }
}

async function deleteColumn(){
  if(!editingColumnKey) return;
  const cols = getColumns();
  if(cols.length <= 1){alert('Precisa ter ao menos uma coluna.');return;}
  const hasTasks = state.tasks.some(t=>t.status===editingColumnKey);
  if(hasTasks && !confirm('Essa coluna tem tarefas — elas serão movidas para a primeira coluna restante. Continuar?')) return;
  const fallback = cols.find(c=>c.key !== editingColumnKey);
  const toMove = state.tasks.filter(t=>t.status===editingColumnKey);
  for(const t of toMove){
    t.status = fallback.key;
    await updateTaskRemote(t.id, t);
  }
  state.columns = cols.filter(c=>c.key !== editingColumnKey);
  const ok = await persistColumns();
  if(ok){
    closeColumnModal();
    render();
    if(document.getElementById('settings-modal').classList.contains('open')) renderSettingsColumnsList();
  }
}

function matchesDateFilter(t, filter){
  if(filter === 'all') return true;
  if(!t.date) return false;
  const today = new Date();
  today.setHours(0,0,0,0);
  const [y,m,d] = t.date.split('-');
  const dt = new Date(+y, +m-1, +d);
  const diff = Math.round((dt-today)/86400000);
  if(filter === 'today') return diff <= 0;
  if(filter === 'next3') return diff <= 3;
  if(filter === 'week') return diff <= 7;
  if(filter === 'month') return diff <= 30;
  return true;
}

function setDateFilter(f){
  state.dateFilter = f;
  render();
}

function priorityWeight(t){
  if(t.priority === 'urgent') return 4;
  if(dateStatus(t.date) === 'overdue' && columnType(t.status) !== 'done') return 3.5;
  if(t.priority === 'high') return 3;
  if(dateStatus(t.date) === 'today') return 2;
  return 1;
}

  const emailPart = session.user.email.split('@')[0];

function fmtDate(iso){
  if(!iso) return '';
  const [y,m,d] = iso.split('-');
  return `${d}/${m}`;
}
function fmtDateFull(iso){
  if(!iso) return 'Sem prazo';
  const [y,m,d] = iso.split('-');
  const dt = new Date(+y, +m-1, +d);
  const dias = ['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];
  const meses = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  return `${dias[dt.getDay()]}, ${+d} ${meses[+m-1]}`;
}
function dateStatus(iso){
  if(!iso) return '';
  const today = new Date();
  today.setHours(0,0,0,0);
  const [y,m,d] = iso.split('-');
  const dt = new Date(+y, +m-1, +d);
  const diff = Math.round((dt-today)/86400000);
  if(diff < 0) return 'overdue';
  if(diff === 0) return 'today';
  return '';
}
function esc(str){
  const d = document.createElement('div');
  d.textContent = str || '';
  return d.innerHTML;
}

function renderClientFocus(){
  const active = state.tasks.filter(t=>columnType(t.status)!=='done');
  if(active.length === 0){
    return `<div class="empty" style="padding:26px 12px;font-size:12.5px;"><strong>Sem pendências</strong>Nenhum cliente ativo</div>`;
  }
  const byClient = {};
  active.forEach(t=>{
    const c = t.client || 'Sem cliente';
    byClient[c] = (byClient[c] || 0) + 1;
  });
  const sorted = Object.entries(byClient).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const max = sorted[0][1];
  return sorted.map(([client, count])=>{
    const pct = (count/max)*100;
    return `
      <div class="client-item">
        <div class="client-name">${esc(client)}</div>
        <div class="client-bar"><div class="client-bar-fill" style="width:${pct}%"></div></div>
        <div class="client-count">${count}</div>
      </div>`;
  }).join('');
}

function renderMiniCal(){
  const d = state.miniCalDate;
  const year = d.getFullYear(), month = d.getMonth();
  const first = new Date(year, month, 1);
  const startDow = first.getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const prevMonthDays = new Date(year, month, 0).getDate();
  const dow = ['D','S','T','Q','Q','S','S'];
  const meses = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  const today = new Date();
  const tasksWithDate = new Set(state.tasks.filter(t=>t.date && columnType(t.status)!=='done').map(t=>t.date));

  let cells = '';
  for(let i=startDow-1;i>=0;i--) cells += `<div class="mini-cal-day other">${prevMonthDays-i}</div>`;
  for(let day=1;day<=daysInMonth;day++){
    const iso = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const isToday = today.getDate()===day && today.getMonth()===month && today.getFullYear()===year;
    const hasTask = tasksWithDate.has(iso);
    cells += `<div class="mini-cal-day ${isToday?'today':''} ${hasTask?'has-task':''}">${day}</div>`;
  }
  const filled = startDow + daysInMonth;
  const trailing = (7 - filled % 7) % 7;
  for(let i=1;i<=trailing;i++) cells += `<div class="mini-cal-day other">${i}</div>`;

  return `
    <div class="mini-cal-head">
      <div class="mini-cal-title">${meses[month]} ${year}</div>
      <div class="mini-cal-nav">
        <button onclick="miniCalNav(-1)"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg></button>
        <button onclick="miniCalNav(1)"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg></button>
      </div>
    </div>
    <div class="mini-cal-grid">
      ${dow.map(d=>`<div class="mini-cal-dow">${d}</div>`).join('')}
      ${cells}
    </div>`;
}

function miniCalNav(delta){state.miniCalDate.setMonth(state.miniCalDate.getMonth()+delta);render();}

                    <div class="kb-card-title">${esc(t.title)}</div>
                    <div class="kb-card-meta">
                      <span class="${dateStatus(t.date)}">${t.date ? fmtDate(t.date) : 'sem prazo'}</span>
                      ${badge}
                    </div>
                  </div>`;
                }).join('')}
            </div>
          </div>`;
      }).join('')}
    </div>`;
}

function dragStart(e, id){e.dataTransfer.setData('text/plain', id);e.dataTransfer.effectAllowed = 'move';}
function dragOver(e){e.preventDefault();e.currentTarget.classList.add('drag-over');}
function dragLeave(e){e.currentTarget.classList.remove('drag-over');}
async function drop(e, status){
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  const id = e.dataTransfer.getData('text/plain');
  const task = state.tasks.find(t=>t.id===id);
  if(task && task.status !== status){
    const prev = task.status;
    task.status = status;
    render();
    const ok = await updateTaskRemote(id, task);
    if(!ok){task.status = prev;render();}
  }
}

function renderCalendar(){
  const d = state.calDate;
  const year = d.getFullYear(), month = d.getMonth();
  const first = new Date(year, month, 1);
  const startDow = first.getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const dow = ['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];
  const meses = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  const today = new Date();
  const tasksByDate = {};
  state.tasks.forEach(t=>{if(t.date){if(!tasksByDate[t.date]) tasksByDate[t.date] = [];tasksByDate[t.date].push(t);}});

  let cells = '';
  const prevMonthDays = new Date(year, month, 0).getDate();
  for(let i=startDow-1;i>=0;i--) cells += `<div class="cal-cell other"><div class="cal-cell-num">${prevMonthDays-i}</div></div>`;
  for(let day=1;day<=daysInMonth;day++){
    const iso = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const isToday = today.getDate()===day && today.getMonth()===month && today.getFullYear()===year;
    const isSelected = state.calSelectedDate === iso;
    const list = tasksByDate[iso] || [];
    cells += `
      <div class="cal-cell ${isToday?'today':''} ${isSelected?'selected':''}" data-date="${iso}">
        <div class="cal-cell-num">${day}</div>
        ${list.map(t=>`<div class="cal-task" style="border-left-color:${columnColor(t.status)};${columnType(t.status)==='done'?'opacity:0.55;':''}" data-task-id="${t.id}" title="${esc(t.title)}">${esc(t.title)}</div>`).join('')}
      </div>`;
  }
  const filled = startDow + daysInMonth;
  const trailing = (7 - filled % 7) % 7;
  for(let i=1;i<=trailing;i++) cells += `<div class="cal-cell other"><div class="cal-cell-num">${i}</div></div>`;

  const dayPanel = state.calSelectedDate ? renderDayPanel(state.calSelectedDate, tasksByDate[state.calSelectedDate] || []) : '';

  return `
    <div class="view-header">
      <div><div class="eyebrow">Prazos e agenda</div><h1>Calendário</h1></div>
      <button class="btn-primary" onclick="openModal()">+ Nova tarefa</button>
    </div>
    <div class="glass cal-view">
      <div class="cal-view-head">
        <div class="cal-view-title">${meses[month]} ${year}</div>
        <div class="cal-view-nav">
          <button onclick="calNav(-1)">← Anterior</button>
          <button onclick="calToday()">Hoje</button>
          <button onclick="calNav(1)">Próximo →</button>
        </div>
      </div>
      <div class="cal-grid">
        ${dow.map(d=>`<div class="cal-dow">${d}</div>`).join('')}
        ${cells}
      </div>
    </div>
    ${dayPanel}`;
}

function renderDayPanel(iso, tasks){
  const [y,m,d] = iso.split('-');
  const dt = new Date(+y, +m-1, +d);
  const dias = ['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];
  const meses = ['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
  const dateLabel = `${dias[dt.getDay()]}, ${+d} de ${meses[+m-1]}`;

  return `
    <div class="glass day-panel">
      <div class="day-panel-head">
        <div class="day-panel-date">${dateLabel}</div>
        <div class="day-panel-actions">
          <button class="btn-primary" onclick="openModal(null,'${iso}')">+ Adicionar neste dia</button>
          <button class="day-panel-close" onclick="selectCalDay(null)" title="Fechar">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
      </div>
      ${tasks.length===0
        ? `<div class="empty"><strong>Nada agendado neste dia.</strong>Clica em "Adicionar neste dia" pra criar uma tarefa.</div>`
        : `<div class="day-panel-tasks">
            ${tasks.map(t=>{
              const priorityBadge = t.priority === 'urgent' ? '<span class="priority-badge urgent">🔥 Urgente</span>' : t.priority === 'high' ? '<span class="priority-badge high">Alta</span>' : '';
              return `
                <div class="day-task ${columnType(t.status)==='done'?'done':''}" style="--col-color:${columnColor(t.status)}" onclick="openModal('${t.id}')">
                  <div class="day-task-head">
                    <div class="day-task-title">${esc(t.title)}</div>
                    ${priorityBadge}
                  </div>
                  <div class="day-task-meta">
                    <span>${esc(t.client || 'sem cliente')}</span>
                    <span>·</span>
                    <span>${esc(columnName(t.status))}</span>
                  </div>
                  ${t.notes ? `<div class="day-task-notes">${esc(t.notes)}</div>` : ''}
                </div>`;
            }).join('')}
          </div>`
      }
    </div>`;
}

function selectCalDay(iso){
  state.calSelectedDate = (state.calSelectedDate === iso) ? null : iso;
  render();
  if(state.calSelectedDate){
    setTimeout(()=>{
      const panel = document.querySelector('.day-panel');
      if(panel) panel.scrollIntoView({behavior:'smooth', block:'nearest'});
    }, 50);
  }
}

function calNav(delta){state.calDate.setMonth(state.calDate.getMonth()+delta);render();}
function calToday(){state.calDate = new Date();render();}

function renderTable(){
  const clientes = [...new Set(state.tasks.map(t=>t.client).filter(Boolean))].sort();
  let filtered = [...state.tasks];
  if(state.filter.status) filtered = filtered.filter(t=>t.status===state.filter.status);
  if(state.filter.client) filtered = filtered.filter(t=>t.client===state.filter.client);
  if(state.filter.search){
    const s = state.filter.search.toLowerCase();
    filtered = filtered.filter(t=>(t.title||'').toLowerCase().includes(s) || (t.client||'').toLowerCase().includes(s) || (t.notes||'').toLowerCase().includes(s));
  }
  filtered.sort((a,b)=>{if(!a.date) return 1;if(!b.date) return -1;return a.date.localeCompare(b.date);});

  return `
    <div class="view-header">
      <div><div class="eyebrow">Visão completa</div><h1>Todas as tarefas</h1></div>
      <button class="btn-primary" onclick="openModal()">+ Nova tarefa</button>
    </div>
    <div class="glass table-view">
      <div class="table-filters">
        <input type="text" class="input search" id="f-search" placeholder="Buscar por título, cliente ou notas..." value="${esc(state.filter.search)}">
        <select class="select" id="f-status" style="width:auto;">
          <option value="">Todos status</option>
          ${getColumns().map(c=>`<option value="${c.key}" ${state.filter.status===c.key?'selected':''}>${esc(c.name)}</option>`).join('')}
        </select>
        <select class="select" id="f-client" style="width:auto;">
          <option value="">Todos clientes</option>
          ${clientes.map(c=>`<option value="${esc(c)}" ${state.filter.client===c?'selected':''}>${esc(c)}</option>`).join('')}
        </select>
      </div>
      ${filtered.length===0
        ? `<div class="empty" style="margin:28px;"><strong>Nenhuma tarefa encontrada</strong>Ajuste os filtros ou crie uma nova.</div>`
        : `<table class="task-table">
            <thead><tr><th>Tarefa</th><th>Cliente</th><th>Status</th><th>Prazo</th></tr></thead>
            <tbody>
              ${filtered.map(t=>`
                <tr onclick="openModal('${t.id}')">
                  <td>${esc(t.title)}</td>
                  <td>${esc(t.client || '—')}</td>
                  <td><span class="badge"><span class="badge-dot" style="background:${columnColor(t.status)}"></span>${esc(columnName(t.status))}</span></td>
                  <td>${t.date ? fmtDateFull(t.date) : '—'}</td>
                </tr>`).join('')}
            </tbody>
          </table>`
      }
    </div>`;
}

function attachEvents(){
  document.querySelectorAll('.nav-item, .mobile-nav-item').forEach(el=>{el.onclick = ()=>{state.view = el.dataset.view;render();window.scrollTo(0,0);};});
  const fs = document.getElementById('f-search');
  if(fs) fs.oninput = (e)=>{state.filter.search = e.target.value;render();document.getElementById('f-search').focus();};
  const fst = document.getElementById('f-status');
  if(fst) fst.onchange = (e)=>{state.filter.status = e.target.value;render();};
  const fc = document.getElementById('f-client');
  if(fc) fc.onchange = (e)=>{state.filter.client = e.target.value;render();};

  document.querySelectorAll('.cal-cell[data-date]').forEach(cell=>{
    cell.addEventListener('click', (e)=>{
      const taskEl = e.target.closest('.cal-task');
      if(taskEl){
        openModal(taskEl.dataset.taskId);
        return;
      }
      selectCalDay(cell.dataset.date);
    });
  });
}

function openModal(id, prefillDate){
  state.editingId = id || null;
  const modal = document.getElementById('modal');
  const title = document.getElementById('modal-title');
  const delBtn = document.getElementById('m-delete');
  if(id){
    const t = state.tasks.find(x=>x.id===id);
    if(!t) return;
    title.textContent = 'Editar tarefa';
    document.getElementById('m-title').value = t.title || '';
    document.getElementById('m-client').value = t.client || '';
    populateStatusSelect('m-status', t.status || getColumns()[0].key);
    document.getElementById('m-date').value = t.date || '';
    document.getElementById('m-priority').value = t.priority || 'normal';
    document.getElementById('m-notes').value = t.notes || '';
    delBtn.style.display = '';
  }else{
    title.textContent = 'Nova tarefa';
    document.getElementById('m-title').value = '';
    document.getElementById('m-client').value = '';
    populateStatusSelect('m-status', getColumns()[0].key);
    document.getElementById('m-date').value = prefillDate || '';
    document.getElementById('m-priority').value = 'normal';
    document.getElementById('m-notes').value = '';
    delBtn.style.display = 'none';
  }
  modal.classList.add('open');
  setTimeout(()=>document.getElementById('m-title').focus(), 50);
}

function closeModal(){document.getElementById('modal').classList.remove('open');state.editingId = null;}

async function saveTask(){
  const title = document.getElementById('m-title').value.trim();
  if(!title){document.getElementById('m-title').focus();return;}
  const data = {
    title,
    client: document.getElementById('m-client').value.trim(),
    status: document.getElementById('m-status').value,
    date: document.getElementById('m-date').value,
    priority: document.getElementById('m-priority').value,
    notes: document.getElementById('m-notes').value.trim()
  };
  if(state.editingId){
    const ok = await updateTaskRemote(state.editingId, data);
    if(ok){
      const t = state.tasks.find(x=>x.id===state.editingId);
      Object.assign(t, data);
    }
  }else{
    const newTask = await createTaskRemote(data);
    if(newTask) state.tasks.push(newTask);
  }
  closeModal();render();
}

async function deleteTask(){
  if(!state.editingId) return;
  if(!confirm('Excluir esta tarefa?')) return;
  const ok = await deleteTaskRemote(state.editingId);
  if(ok){
    state.tasks = state.tasks.filter(t=>t.id !== state.editingId);
    closeModal();render();
  }
}

async function quickAdd(){
  const title = document.getElementById('qa-title').value.trim();
  if(!title){document.getElementById('qa-title').focus();return;}
  const data = {
    title,
    client: document.getElementById('qa-client').value.trim(),
    status: getColumns()[0].key,
    date: document.getElementById('qa-date').value,
    priority: 'normal',
    notes: ''
  };
  const newTask = await createTaskRemote(data);
  if(newTask){state.tasks.push(newTask);render();}
}

async function formatNotes(){
  const textarea = document.getElementById('m-notes');
  const btn = document.getElementById('btn-format');
  const raw = textarea.value.trim();
  if(!raw){textarea.focus();return;}

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Formatando';

  try{
    const response = await fetch('/api/format', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({text: raw})
    });
    const data = await response.json();
    if(!response.ok){
      alert(data.error || 'Erro ao formatar');
    } else if(data.text){
      textarea.value = data.text;
    }
  }catch(e){
    alert('Erro de conexão. Tenta de novo.');
  }

  btn.disabled = false;
  btn.innerHTML = '✨ Formatar';
}

document.getElementById('modal').addEventListener('click', (e)=>{if(e.target.id === 'modal') closeModal();});
document.getElementById('settings-modal').addEventListener('click', (e)=>{if(e.target.id === 'settings-modal') closeSettings();});
document.getElementById('column-modal').addEventListener('click', (e)=>{if(e.target.id === 'column-modal') closeColumnModal();});
document.addEventListener('keydown', (e)=>{
  if(e.key === 'Escape'){
    closeModal();
    closeSettings();
    closeColumnModal();
  }
  if(e.key === 'n' && !document.getElementById('modal').classList.contains('open') && !document.getElementById('settings-modal').classList.contains('open') && !document.getElementById('column-modal').classList.contains('open') && document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'TEXTAREA'){
    e.preventDefault();openModal();
  }
});

checkAuth();
</script>
